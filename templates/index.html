<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chan's DevOps Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🚀 Chan's DevOps Dashboard</h1>

    <div class="dashboard">

        <div class="card">
            <h2>🟢 Status</h2>
            <p>Online</p>
        </div>

        <div class="card">
            <h2>💻 Hostname</h2>
            <p>{{ hostname }}</p>
        </div>

        <div class="card">
            <h2>🖥 Operating System</h2>
            <p>{{ operating_system }}</p>
        </div>

        <div class="card">
            <h2>🐍 Python Version</h2>
            <p>{{ python_version }}</p>
        </div>

        <div class="card">
            <h2>🕒 Current Time</h2>
            <p>{{ current_time }}</p>
        </div>

    <div class="card">
    <h2>🧠 CPU Usage</h2>
    <p>{{ cpu_usage }}%</p>
</div>

<div class="card">
    <h2>💾 Memory Usage</h2>
    <p>{{ memory_usage }}%</p>
</div>

<div class="card">
    <h2>📀 Disk Usage</h2>
    <p>{{ disk_usage }}%</p>
</div>
    
</div>

</body>

</html>
